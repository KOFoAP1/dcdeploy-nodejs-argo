<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>向阳而生 | 每天一朵正能量</title>
    <style>
        /* 基础样式复位 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #fcf8f2;
            color: #4a4a4a;
            line-height: 1.8;
            padding: 20px;
        }

        /* 顶部横幅 */
        header {
            max-width: 800px;
            margin: 40px auto 20px auto;
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            border-radius: 16px;
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.3);
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* 主体内容区 */
        main {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 今日金句卡片 */
        .quote-card {
            background-color: #fff;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border-left: 6px solid #ff9a9e;
            text-align: center;
        }

        .quote-card p {
            font-size: 1.25rem;
            color: #2c3e50;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .quote-card span {
            font-size: 0.9rem;
            color: #95a5a6;
        }

        /* 能量充电站列表 */
        .section-title {
            font-size: 1.2rem;
            color: #e74c3c;
            margin: 30px 0 15px 5px;
            display: flex;
            align-items: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: #fff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .card h3 {
            font-size: 1.1rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 0.95rem;
            color: #7f8c8d;
        }

        /* 页脚 */
        footer {
            max-width: 800px;
            margin: 50px auto 20px auto;
            text-align: center;
            font-size: 0.85rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <!-- 顶部横幅 -->
    <header>
        <h1>向阳而生，追光而行</h1>
        <p>每一天，都是给生命最好的礼物。把脸迎向阳光，就不会看到阴影。</p>
    </header>

    <!-- 主体区域 -->
    <main>
        
        <!-- 今日金句 -->
        <section class="quote-card">
            <p>“ 乾坤未定，你我皆是黑马；有风有雨是常态，风雨兼程是状态。 ”</p>
            <span>—— 每日早安能量</span>
        </section>

        <h2 class="section-title">💡 能量充电站</h2>

        <!-- 三栏核心卡片 -->
        <section class="grid">
            <div class="card">
                <div class="card-icon">🌱</div>
                <h3>接纳不完美</h3>
                <p>允许自己偶尔的沮丧与失败。花期虽然不同，但每朵花都有盛开的理由和独特的节奏。</p>
            </div>

            <div class="card">
                <div class="card-icon">🏃</div>
                <h3>立刻行动</h3>
                <p>对抗焦虑最有效的方法就是开始做事。哪怕只是读一页书、跑一公里，都是向前的跨步。</p>
            </div>

            <div class="card">
                <div class="card-icon">☀️</div>
                <h3>传递善意</h3>
                <p>一个微笑、一句谢谢，都能给世界带来温度。给予他人力量的同时，你也在滋养自己。</p>
            </div>
        </section>

    </main>

    <!-- 页脚 -->
    <footer>
        <p>© 2026 正能量日志 · 保持热爱 奔赴山海</p>
    </footer>

</body>
</html>
